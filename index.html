<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大谷翔平 DUEL — 打者9人 vs 投手</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c0f;
  --card: #15181f;
  --card2: #1a1d24;
  --border: rgba(255,255,255,0.07);
  --accent: #00e5a0;
  --accent2: #ff5e3a;
  --gold: #f5c542;
  --text: #f0f2f5;
  --muted: #6b7280;
  --font-d: 'Bebas Neue', sans-serif;
  --font-b: 'Noto Sans JP', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-b); min-height: 100vh; }

.header { text-align: center; padding: 2rem 1rem 1.5rem; position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(0,229,160,0.07) 0%, transparent 70%); pointer-events: none; }
.eyebrow { font-size: 10px; letter-spacing: 0.25em; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
.title { font-family: var(--font-d); font-size: clamp(40px, 9vw, 80px); line-height: 0.95; }
.title span { color: var(--accent); }
.subtitle { font-size: 12px; color: var(--muted); margin-top: 6px; letter-spacing: 0.05em; }

.scoreboard-wrap { padding: 0 1rem 1rem; overflow-x: auto; }
.scoreboard { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--card); border-radius: 10px; overflow: hidden; min-width: 360px; }
.scoreboard th, .scoreboard td { border: 1px solid var(--border); padding: 8px 4px; text-align: center; min-width: 28px; }
.scoreboard thead th { background: #0f6e56; color: #fff; font-weight: 500; font-size: 11px; letter-spacing: 0.05em; }
.scoreboard thead th.total { background: #085041; }
.scoreboard tbody td.label { background: var(--card2); font-weight: 500; font-size: 12px; padding: 8px 12px; text-align: left; white-space: nowrap; }
.scoreboard tbody td { color: var(--text); font-weight: 300; }
.scoreboard tbody td.active-inn { background: rgba(0,229,160,0.08); }
.scoreboard tbody td.total-cell { font-weight: 700; color: var(--accent); background: rgba(0,229,160,0.07); }
.scoreboard tbody td.scored { color: var(--accent2); font-weight: 500; }

.speed-bar { display: flex; align-items: center; gap: 10px; padding: 0 1rem 1rem; font-size: 12px; color: var(--muted); }
.speed-bar input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: var(--card2); outline: none; }
.speed-bar input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }

.btn-wrap { padding: 0 1rem 1.5rem; }
.start-btn {
  width: 100%; padding: 18px;
  background: var(--accent); color: #000;
  border: none; border-radius: 12px;
  font-family: var(--font-d); font-size: 26px; letter-spacing: 0.1em;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  position: relative; overflow: hidden;
}
.start-btn:hover { background: #00ffb3; }
.start-btn:active { transform: scale(0.99); }
.start-btn:disabled { background: var(--muted); cursor: not-allowed; }

.log-wrap { padding: 0 1rem 2rem; }
.inning-block { margin-bottom: 10px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
.inning-head {
  background: var(--card2); padding: 8px 14px;
  font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.inn-runs { font-family: var(--font-d); font-size: 18px; color: var(--accent2); }
.inn-runs.zero { color: var(--muted); }
.pa-list { background: var(--card); }
.pa-item {
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  font-size: 13px; line-height: 1.6;
  display: flex; gap: 8px; align-items: flex-start;
  opacity: 0; transform: translateY(4px);
  transition: opacity 0.22s, transform 0.22s;
}
.pa-item.show { opacity: 1; transform: translateY(0); }
.pa-item:last-child { border-bottom: none; }
.pa-num { font-size: 11px; color: var(--muted); min-width: 18px; padding-top: 2px; }
.pa-sit { font-size: 11px; color: var(--muted); white-space: nowrap; padding-top: 2px; }
.pa-res { flex: 1; }
.ev-hr { color: #ff8060; font-weight: 700; }
.ev-3b { color: #f5c542; font-weight: 700; }
.ev-2b { color: var(--accent); font-weight: 500; }
.ev-1b { color: #a8d8c8; }
.ev-bb { color: #d4a820; }
.ev-k  { color: #5b9fd4; }
.ev-out { color: var(--muted); }
.score-flash { color: var(--accent2); font-weight: 700; }

.bases { display: inline-flex; gap: 2px; align-items: center; margin-left: 5px; vertical-align: middle; }
.base { width: 7px; height: 7px; border: 1px solid var(--muted); transform: rotate(45deg); display: inline-block; }
.base.on { background: var(--gold); border-color: var(--gold); }

.final-card {
  margin: 0 1rem 2rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 1.5rem; text-align: center; display: none;
}
.final-card.show { display: block; }
.final-label { font-size: 11px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.final-score { font-family: var(--font-d); font-size: 80px; color: var(--accent); line-height: 1; }
.final-unit { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
.final-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.fs-item { text-align: center; }
.fs-v { font-family: var(--font-d); font-size: 26px; color: var(--text); }
.fs-l { font-size: 10px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
.replay-btn {
  padding: 12px 32px; border: 1px solid var(--accent);
  background: transparent; color: var(--accent); border-radius: 8px;
  font-family: var(--font-b); font-size: 14px; cursor: pointer; transition: background 0.15s;
}
.replay-btn:hover { background: rgba(0,229,160,0.1); }

.footer { padding: 1rem; text-align: center; font-size: 10px; color: var(--muted); line-height: 1.8; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Monte Carlo Simulation</div>
  <div class="title">大谷<span>翔平</span><br>DUEL</div>
  <div class="subtitle">打者・大谷2025（9人） vs 投手・大谷2026 — 9イニング勝負</div>
</div>

<div class="scoreboard-wrap">
  <table class="scoreboard">
    <thead>
      <tr>
        <th>回</th>
        <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
        <th>6</th><th>7</th><th>8</th><th>9</th>
        <th class="total">計</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="label">大谷打線</td>
        <td id="s1"></td><td id="s2"></td><td id="s3"></td>
        <td id="s4"></td><td id="s5"></td><td id="s6"></td>
        <td id="s7"></td><td id="s8"></td><td id="s9"></td>
        <td class="total-cell" id="stotal">—</td>
      </tr>
    </tbody>
  </table>
</div>

<div class="speed-bar">
  <span>早く</span>
  <input type="range" id="speed" min="1" max="5" value="3">
  <span>ゆっくり</span>
</div>

<div class="btn-wrap">
  <button class="start-btn" id="start-btn" onclick="startGame()">▶ 試合開始</button>
</div>

<div class="log-wrap" id="log-wrap"></div>

<div class="final-card" id="final-card">
  <div class="final-label">試合終了 — 大谷打線の得点</div>
  <div class="final-score" id="final-score">0</div>
  <div class="final-unit">点</div>
  <div class="final-stats" id="final-stats"></div>
  <button class="replay-btn" onclick="resetGame()">↺ もう一度</button>
</div>

<div class="footer">
  打者：大谷翔平 2025年（打率.282 / 出塁率.392 / HR55本 / OPS1.014）<br>
  投手：大谷翔平 2026年（防御率2.50 / WHIP0.98 / K/9 12.5）<br>
  打席結果を実績確率から乱数生成するモンテカルロシミュレーション
</div>

<script>
const BATTING = { K:0.270, BB:0.070, HBP:0.008, HR:0.086, '3B':0.006, '2B':0.026, '1B':0.096 };
const EV_LABEL = { K:'三振', BB:'四球', HBP:'死球', HR:'ホームラン', '3B':'三塁打', '2B':'二塁打', '1B':'ヒット', OUT:'凡退' };
const EV_CLASS = { K:'ev-k', BB:'ev-bb', HBP:'ev-bb', HR:'ev-hr', '3B':'ev-3b', '2B':'ev-2b', '1B':'ev-1b', OUT:'ev-out' };

function getOutcome() {
  const total = Object.values(BATTING).reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (const [ev, p] of Object.entries(BATTING)) { r -= p; if (r <= 0) return ev; }
  return 'OUT';
}

function outs2str(o) { return ['無死','一死','二死'][o]; }
function bases2str(b) {
  const s = [b[0]&&'一塁', b[1]&&'二塁', b[2]&&'三塁'].filter(Boolean);
  return s.length ? s.join('・') : '走者なし';
}
function basesHtml(b) {
  return `<span class="bases">
    <span class="base ${b[2]?'on':''}"></span>
    <span class="base ${b[0]?'on':''}"></span>
    <span class="base ${b[1]?'on':''}"></span>
  </span>`;
}

function simulateGame() {
  return Array.from({length:9}, () => {
    let outs=0, runs=0, bases=[0,0,0];
    const pas=[];
    while (outs < 3) {
      const ev = getOutcome();
      const sb=[...bases], so=outs;
      let r=0;
      if (ev==='K'||ev==='OUT') { outs++; }
      else if (ev==='BB'||ev==='HBP') {
        if (bases[0]&&bases[1]&&bases[2]) r=1;
        else if (bases[0]&&bases[1]) bases[2]=1;
        else if (bases[0]) bases[1]=1;
        else bases[0]=1;
        runs+=r;
      } else if (ev==='1B') {
        r=bases[2]?1:0;
        const nb2=Math.random()<0.35?bases[0]:0;
        bases[2]=bases[1]; bases[1]=nb2; bases[0]=1; runs+=r;
      } else if (ev==='2B') {
        r=bases[2]+(bases[1]?1:0);
        const ob1=bases[0]; bases[2]=ob1; bases[1]=1; bases[0]=0; runs+=r;
      } else if (ev==='3B') {
        r=bases[0]+bases[1]+bases[2]; bases=[0,0,1]; runs+=r;
      } else if (ev==='HR') {
        r=1+bases[0]+bases[1]+bases[2]; bases=[0,0,0]; runs+=r;
      }
      pas.push({ev, outs:so, bases:sb, runs:r});
    }
    return {runs, pas};
  });
}

let totalScore=0, gameStats={hits:0,hrs:0,ks:0,bbs:0};

function getDelay() { return [80,160,300,480,700][parseInt(document.getElementById('speed').value)-1]; }
function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function startGame() {
  const btn = document.getElementById('start-btn');
  btn.disabled=true; btn.textContent='試合中...';
  document.getElementById('log-wrap').innerHTML='';
  document.getElementById('final-card').classList.remove('show');
  totalScore=0; gameStats={hits:0,hrs:0,ks:0,bbs:0};
  for (let i=1;i<=9;i++) { document.getElementById('s'+i).textContent=''; document.getElementById('s'+i).className=''; }
  document.getElementById('stotal').textContent='—';

  const innings = simulateGame();
  for (let i=0;i<9;i++) {
    await playInning(i+1, innings[i]);
    totalScore += innings[i].runs;
    const cell = document.getElementById('s'+(i+1));
    cell.textContent = innings[i].runs;
    if (innings[i].runs>0) cell.classList.add('scored');
    document.getElementById('stotal').textContent = totalScore;
    await sleep(getDelay()*0.5);
  }
  showFinal(innings);
}

async function playInning(num, inning) {
  const block = document.createElement('div');
  block.className='inning-block';
  block.innerHTML=`
    <div class="inning-head">
      <span>▸ ${num}回表</span>
      <span class="inn-runs zero" id="ir${num}">0点</span>
    </div>
    <div class="pa-list" id="pl${num}"></div>`;
  document.getElementById('log-wrap').appendChild(block);
  block.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.getElementById('s'+num).classList.add('active-inn');

  let innRuns=0;
  for (const pa of inning.pas) {
    await sleep(getDelay());
    addPa(num, pa);
    innRuns+=pa.runs;
    if (['1B','2B','3B','HR'].includes(pa.ev)) gameStats.hits++;
    if (pa.ev==='HR') gameStats.hrs++;
    if (pa.ev==='K') gameStats.ks++;
    if (pa.ev==='BB'||pa.ev==='HBP') gameStats.bbs++;
    if (innRuns>0) {
      const el=document.getElementById('ir'+num);
      el.textContent=innRuns+'点'; el.classList.remove('zero');
    }
  }
  document.getElementById('s'+num).classList.remove('active-inn');
}

let paCounters = {};
function addPa(innNum, pa) {
  if (!paCounters[innNum]) paCounters[innNum]=0;
  paCounters[innNum]++;
  const n=paCounters[innNum];
  const isOut=pa.ev==='K'||pa.ev==='OUT';
  const cls=EV_CLASS[pa.ev]||'ev-out';
  const lbl=EV_LABEL[pa.ev]||'凡退';
  let runsHtml='';
  if (pa.runs===1) runsHtml=`<span class="score-flash"> 1点追加！</span>`;
  else if (pa.runs===2) runsHtml=`<span class="score-flash"> 2点追加！</span>`;
  else if (pa.runs===3) runsHtml=`<span class="score-flash"> 3点追加！</span>`;
  else if (pa.runs>=4) runsHtml=`<span class="score-flash"> ${pa.runs}点追加！満塁弾！！</span>`;

  if (pa.ev==='HR' && pa.runs===1) runsHtml=`<span class="score-flash"> ソロ！</span>`;

  const item=document.createElement('div');
  item.className='pa-item';
  item.innerHTML=`
    <span class="pa-num">${n}</span>
    <span class="pa-sit">${outs2str(pa.outs)} ${bases2str(pa.bases)}${basesHtml(pa.bases)}</span>
    <span class="pa-res"><span class="${cls}">${lbl}</span>${runsHtml}</span>`;
  document.getElementById('pl'+innNum).appendChild(item);
  requestAnimationFrame(()=>item.classList.add('show'));
}

function showFinal(innings) {
  const ab=innings.reduce((s,inn)=>s+inn.pas.length,0);
  const avg=ab>0?Math.round(gameStats.hits/ab*1000)/10:0;
  document.getElementById('final-score').textContent=totalScore;
  document.getElementById('final-stats').innerHTML=`
    <div class="fs-item"><div class="fs-v">${ab}</div><div class="fs-l">打数</div></div>
    <div class="fs-item"><div class="fs-v">${gameStats.hits}</div><div class="fs-l">安打</div></div>
    <div class="fs-item"><div class="fs-v">${gameStats.hrs}</div><div class="fs-l">本塁打</div></div>
    <div class="fs-item"><div class="fs-v">${gameStats.ks}</div><div class="fs-l">三振</div></div>
    <div class="fs-item"><div class="fs-v">${gameStats.bbs}</div><div class="fs-l">四球</div></div>
    <div class="fs-item"><div class="fs-v">${avg}%</div><div class="fs-l">打率</div></div>`;
  document.getElementById('final-card').classList.add('show');
  document.getElementById('final-card').scrollIntoView({behavior:'smooth',block:'start'});
}

function resetGame() {
  paCounters={};
  document.getElementById('log-wrap').innerHTML='';
  document.getElementById('final-card').classList.remove('show');
  for (let i=1;i<=9;i++) { document.getElementById('s'+i).textContent=''; document.getElementById('s'+i).className=''; }
  document.getElementById('stotal').textContent='—';
  const btn=document.getElementById('start-btn');
  btn.disabled=false; btn.textContent='▶ 試合開始';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
